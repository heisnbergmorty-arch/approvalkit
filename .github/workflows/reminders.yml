# Daily reminder cron — alternative to Vercel Cron.
# Pings /api/cron/reminders every day at 14:00 UTC.
name: Daily review reminders

on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger reminder cron
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl --fail --silent --show-error \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$APP_URL/api/cron/reminders"
